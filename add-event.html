<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventify | Add Event</title>

  <!-- Bootstrap CSS framework -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Eventify</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="add-event.html">Add Event</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="events.html">View Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
        </ul>

        <div id="navAuth" class="ms-3"></div>
      </div>
    </div>
  </nav>

  <!-- Page header -->
  <header class="page-header">
    <div class="container">
      <h1 class="fw-bold">Add Event</h1>
      <p class="lead mb-0">Complete the form below to add a public event to the Eventify prototype.</p>
    </div>
  </header>

  <!-- Add event form -->
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div id="formMessage"></div>

        <form id="addEventForm" class="form-card" novalidate>
          <div class="mb-3">
            <label for="eventTitle" class="form-label">Event title</label>
            <input type="text" class="form-control" id="eventTitle" placeholder="Example: Cardiff Food Festival">
          </div>

          <div class="mb-3">
            <label for="eventDate" class="form-label">Event date</label>
            <input type="date" class="form-control" id="eventDate">
          </div>

          <div class="mb-3">
            <label for="eventLocation" class="form-label">Location</label>
            <input type="text" class="form-control" id="eventLocation" placeholder="Example: Cardiff Bay">
          </div>

          <div class="mb-3">
            <label for="eventCategory" class="form-label">Category</label>
            <select class="form-select" id="eventCategory">
              <option value="">Select a category</option>
              <option value="Community">Community</option>
              <option value="Music">Music</option>
              <option value="Education">Education</option>
              <option value="Sport">Sport</option>
              <option value="Arts and Culture">Arts and Culture</option>
              <option value="Business">Business</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="eventDescription" class="form-label">Event description</label>
            <textarea class="form-control" id="eventDescription" rows="5" placeholder="Describe the event, intended audience and key information."></textarea>
          </div>

          <div class="d-grid d-md-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Event</button>
            <button type="reset" class="btn btn-outline-secondary">Clear Form</button>
            <a href="events.html" class="btn btn-outline-primary">View Events</a>
          </div>
        </form>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 Eventify. Developed for DAT6006 Full Stack Development.</p>
    </div>
  </footer>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JavaScript -->
  <script src="js/main.js"></script>
  <script src="js/events.js"></script>
  <script src="js/auth.js"></script>
  <script>
    protectPage();
  </script>
</body>
</html>
