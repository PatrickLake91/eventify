<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventify | Login</title>

  <!-- Bootstrap CSS framework -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Eventify</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="add-event.html">Add Event</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="events.html">View Events</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
        </ul>

        <div id="navAuth" class="ms-3"></div>
      </div>
    </div>
  </nav>

  <!-- Page header -->
  <header class="page-header">
    <div class="container">
      <h1 class="fw-bold">Organiser Login</h1>
      <p class="lead mb-0">Sign in to manage event information in the Eventify prototype.</p>
    </div>
  </header>

  <!-- Login form -->
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-5">

        <div class="form-card">
          <form id="loginForm" novalidate>

            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" id="username" class="form-control" autocomplete="username" required>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input type="password" id="password" class="form-control" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Login
            </button>

            <p class="text-muted small mt-3 mb-0 text-center">
              Mock login only. Enter any username and password to continue.
            </p>

          </form>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 Eventify. Developed for DAT6006 Full Stack Development.</p>
    </div>
  </footer>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Authentication JavaScript -->
  <script src="js/auth.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("loginForm");

      if (!form) {
        return;
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();

        if (!username || !password) {
          alert("Enter username and password.");
          return;
        }

        login();
      });
    });
  </script>

</body>
</html>
